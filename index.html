<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerTrack Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-base-500 mx-auto max-w-full">

<div class="max-w-5xl mx-auto p-4">

  
  <header class="mb-8">
    <h1 class="text-3xl font-bold mb-6">CareerTrack Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="card bg-base-100 shadow p-5">
        <p class="text-sm">Total Jobs</p>
        <h2 id="totalCount" class="text-2xl font-bold">0</h2>
      </div>

      <div class="card bg-base-100 shadow p-5">
        <p class="text-sm">Interview</p>
        <h2 id="interviewCount" class="text-2xl font-bold text-green-600">0</h2>
      </div>

      <div class="card bg-base-100 shadow p-5">
        <p class="text-sm">Rejected</p>
        <h2 id="rejectedCount" class="text-2xl font-bold text-red-600">0</h2>
      </div>
    </div>
  </header>

  
  <section>

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold">Available Jobs</h2>
      <p id="tabCount" class="text-sm">0 jobs</p>
    </div>

    
    <div class="flex gap-3 mb-6">
      <button class="btn btn-primary tabBtn" data-tab="all">All</button>
      <button class="btn tabBtn" data-tab="interview">Interview</button>
      <button class="btn tabBtn" data-tab="rejected">Rejected</button>
    </div>

    <div id="jobContainer" class="flex flex-col gap-6"></div>

    <div id="emptyState" class="hidden text-center py-16">
      <img class="fa-solid fa-briefcase text-5xl text-gray-400 mb-4" src="./jobs.png" alt="">
      <h3 class="text-xl font-bold">No Jobs Available</h3>
      <p class="text-gray-500">
        Check back soon for new job opportunities
      </p>
    </div>

  </section>
</div>

<script src="./script.js"></script>
</body>
</html>
